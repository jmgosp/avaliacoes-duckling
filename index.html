<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin DUCKLING - Gestão Total</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f4f7f9; font-family: 'Montserrat', sans-serif; padding: 40px 20px; }
        .container-fluid { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); max-width: 1300px; margin: auto; }
        h2 { font-family: 'Playfair Display', serif; letter-spacing: 2px; color: #111; border-bottom: 2px solid #45ade5; display: inline-block; margin-bottom: 30px; }
        .table { vertical-align: middle; }
        .star-gold { color: #ffc107; font-weight: bold; }
        .btn-edit { background: #45ade5; color: white; border: none; font-size: 11px; font-weight: 700; border-radius: 50px; padding: 5px 15px; margin-right: 5px; }
        .btn-delete { background: #ff4b4b; color: white; border: none; font-size: 11px; font-weight: 700; border-radius: 50px; padding: 5px 15px; }
        .badge-id { background: #f0f0f0; color: #999; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Gestão de Avaliações</h2>
        <span id="status-auth" class="badge bg-success">Painel Online</span>
    </div>
    
    <div class="table-responsive">
        <table class="table table-hover">
            <thead class="table-light">
                <tr>
                    <th>Data</th>
                    <th>Produto</th> <th>Nome do Cliente</th>
                    <th>Estrelas</th>
                    <th>Comentário</th>
                    <th class="text-end">Ações</th>
                </tr>
            </thead>
            <tbody id="admin-list">
                <tr><td colspan="6" class="text-center">Sincronizando dados...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content" style="border-radius: 20px;">
            <div class="modal-header">
                <h5 class="modal-title">Editar Avaliação</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-id">
                <div class="mb-3">
                    <label class="form-label">Nome</label>
                    <input type="text" id="edit-name" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Estrelas (1 a 5)</label>
                    <input type="number" id="edit-stars" class="form-control" min="1" max="5">
                </div>
                <div class="mb-3">
                    <label class="form-label">Comentário</label>
                    <textarea id="edit-comment" class="form-control" rows="4"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" style="background:#45ade5; border:none;" onclick="salvarEdicao()">SALVAR ALTERAÇÕES</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBcwGluJCAPwxFIL2w1cFCJywph57RVWQo",
        authDomain: "avaliacoes-duckling.firebaseapp.com",
        projectId: "avaliacoes-duckling",
        storageBucket: "avaliacoes-duckling.firebasestorage.app",
        messagingSenderId: "30977663551",
        appId: "1:30977663551:web:4da25395324c8fa5428e8a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const editModal = new bootstrap.Modal(document.getElementById('editModal'));

    signInAnonymously(auth);

    window.abrirEditar = (id, nome, estrelas, comentario) => {
        document.getElementById('edit-id').value = id;
        document.getElementById('edit-name').value = nome;
        document.getElementById('edit-stars').value = estrelas;
        document.getElementById('edit-comment').value = comentario;
        editModal.show();
    };

    window.salvarEdicao = async () => {
        const id = document.getElementById('edit-id').value;
        const nome = document.getElementById('edit-name').value;
        const estrelas = parseInt(document.getElementById('edit-stars').value);
        const comentario = document.getElementById('edit-comment').value;
        try {
            await updateDoc(doc(db, "avaliacoes", id), { name: nome, stars: estrelas, comment: comentario });
            editModal.hide();
        } catch (e) { alert("Erro: " + e.message); }
    };

    window.excluirAvaliacao = async (id) => {
        if(confirm("Excluir para sempre?")) await deleteDoc(doc(db, "avaliacoes", id));
    };

    onSnapshot(collection(db, "avaliacoes"), (snapshot) => {
        const list = document.getElementById('admin-list');
        list.innerHTML = "";

        const sorted = snapshot.docs.sort((a, b) => (b.data().createdAt?.seconds || 0) - (a.data().createdAt?.seconds || 0));

        sorted.forEach((d) => {
            const data = d.data();
            const date = data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleDateString('pt-BR') : 'Agora';
            
            const row = `
                <tr>
                    <td><small>${date}</small></td>
                    <td>
                        <div style="font-weight: 700; color: #111;">${data.productName || 'Produto Antigo'}</div>
                        <small class="badge badge-id" style="font-size: 9px;">ID: ${data.productId}</small>
                    </td>
                    <td><strong>${data.name}</strong></td>
                    <td><span class="star-gold">${data.stars} ★</span></td>
                    <td><small>${data.comment || '-'}</small></td>
                    <td class="text-end" style="white-space:nowrap;">
                        <button class="btn btn-edit" onclick="abrirEditar('${d.id}', '${data.name}', '${data.stars}', '${data.comment || ''}')">EDITAR</button>
                        <button class="btn btn-delete" onclick="excluirAvaliacao('${d.id}')">EXCLUIR</button>
                    </td>
                </tr>
            `;
            list.innerHTML += row;
        });
    });
</script>
</body>
</html>
